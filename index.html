
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agoziem Store</title>
    <link rel="stylesheet" href="./index-2.css">
</head>
<body>

    <div class="container">

        <nav>

            <div class="logo">AgoziemStore</div>

            <div class="search-container">
                <input
                    type="text"
                    class="search-product"
                    placeholder="Search products, brands and categories">

                <button class="search-btn">Search</button>
            </div>

            <div class="details">
                <div class="account">Account</div>
                <div class="help">Help</div>
                <div class="cart">Cart</div>
            </div>

        </nav>

        <div class="prodocts">

            <div class="product-card">
                <div class="image-div">
                    <img src="https://fakestoreapi.com/img/81fPKd-2AYL._AC_SL1500_t.png" alt="">
                </div>

                <div class="product-details">
                    <p class="title">
                        Fjallraven - Foldsack No. 1 Backpack, Fits 15 Laptops
                    </p>

                    <div class="product-footer">
                        <p class="price">$109.95</p>
                        <button class="add-to-cart">Add to Cart</button>
                    </div>
                </div>
            </div>

            

        </div>

        <div class="view-product active">
            <div class="image-div">
                <img class="product-image" src="https://fakestoreapi.com/img/81fPKd-2AYL._AC_SL1500_t.png" alt="">
            </div>

            <div class="product-details">
                <p class="title"></p>
                <p class="description"></p>

                <div class="product-footer">
                    <p class="price"></p>
                    <button class="add-to-cart">Add to Cart</button>
                </div>
            </div>
            <div class="close">X</div>
        </div>

    </div>

    <script src="./index.js"></script>

</body>
</html>
